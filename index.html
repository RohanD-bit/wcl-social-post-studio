<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WCL Social Post Studio</title>
    <style>
      :root {
        --background: #f4f5f1;
        --foreground: #141820;
        --muted: #667085;
        --line: #d9ddd4;
        --panel: #ffffff;
        --panel-soft: #f9faf6;
        --green: #1f7a55;
        --green-dark: #14533d;
        --blue: #1769c2;
        --sky: #2aa8ef;
        --coral: #f05252;
        --amber: #bd7d18;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(244, 245, 241, 0.96), rgba(237, 240, 233, 0.96)),
          radial-gradient(circle at 12% 10%, rgba(31, 122, 85, 0.14), transparent 28%),
          radial-gradient(circle at 86% 0%, rgba(23, 105, 194, 0.12), transparent 30%);
        color: var(--foreground);
        font-family: Arial, Helvetica, sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        font-weight: 900;
      }

      h2 {
        font-size: 17px;
        font-weight: 900;
      }

      h3 {
        font-size: 15px;
        font-weight: 900;
      }

      .app-shell {
        min-height: 100vh;
        padding: 20px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        min-height: 88px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        padding: 18px 20px;
      }

      .eyebrow {
        margin-bottom: 5px;
        color: var(--green);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .topbar-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .primary-button,
      .ghost-button,
      .segmented-control button,
      .queue-item {
        min-height: 42px;
        border-radius: 8px;
        border: 1px solid var(--line);
      }

      .primary-button,
      .ghost-button {
        padding: 0 16px;
        font-weight: 800;
      }

      .primary-button {
        border-color: var(--green-dark);
        background: var(--green);
        color: #ffffff;
      }

      .ghost-button {
        background: #ffffff;
        color: var(--foreground);
      }

      .metrics-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .source-status {
        min-height: 42px;
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        padding: 11px 14px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .metric {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 70px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 14px 16px;
      }

      .metric span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .metric strong {
        font-size: 30px;
        line-height: 1;
      }

      .workbench {
        display: grid;
        grid-template-columns: minmax(260px, 310px) minmax(440px, 1fr) minmax(350px, 430px);
        gap: 14px;
        margin-top: 14px;
        align-items: start;
      }

      .queue,
      .editor,
      .preview-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        padding: 14px;
      }

      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 36px;
        margin-bottom: 12px;
      }

      .section-heading span,
      .verification-row span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .queue-list {
        display: grid;
        gap: 8px;
        max-height: 640px;
        overflow: auto;
        padding-right: 4px;
      }

      .queue-tools {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .queue-tools input,
      .queue-tools select {
        width: 100%;
      }

      .queue-summary {
        min-height: 28px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .show-more {
        width: 100%;
        min-height: 40px;
        margin-top: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--green-dark);
        font-weight: 900;
      }

      .queue-item {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr);
        gap: 10px;
        width: 100%;
        min-height: 82px;
        background: var(--panel-soft);
        padding: 10px;
        text-align: left;
      }

      .queue-item.active {
        border-color: var(--green);
        background: #eef7f1;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        margin-top: 5px;
        border-radius: 999px;
        background: var(--muted);
      }

      .status-dot.new {
        background: var(--amber);
      }

      .status-dot.verify {
        background: var(--coral);
      }

      .status-dot.ready {
        background: var(--green);
      }

      .status-dot.posted {
        background: var(--blue);
      }

      .queue-main {
        display: grid;
        gap: 5px;
        min-width: 0;
      }

      .queue-main strong,
      .queue-main small {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .queue-main strong {
        font-size: 14px;
      }

      .queue-main small {
        color: var(--muted);
        font-size: 12px;
      }

      .queue-date {
        grid-column: 2;
        color: var(--green-dark);
        font-size: 12px;
        font-weight: 800;
      }

      .connection-panel {
        margin-top: 14px;
        border-top: 1px solid var(--line);
        padding-top: 14px;
      }

      .connection-panel h2 {
        margin-bottom: 10px;
      }

      .check-row {
        display: flex;
        align-items: center;
        gap: 9px;
        min-height: 32px;
        color: #394150;
        font-size: 13px;
        font-weight: 700;
      }

      .check-row input {
        width: 18px;
        height: 18px;
        accent-color: var(--green);
      }

      .segmented-control {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 14px;
      }

      .segmented-control button {
        background: #f7f8f4;
        color: var(--foreground);
        font-size: 14px;
        font-weight: 900;
      }

      .segmented-control button.selected {
        border-color: var(--blue);
        background: #eaf3ff;
        color: #0f4f94;
      }

      select {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 0 10px;
        color: var(--foreground);
        font-weight: 700;
      }

      .form-grid,
      .mini-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .field span {
        color: #3b4250;
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .field input,
      .field textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--foreground);
        outline: none;
      }

      .field input {
        height: 42px;
        padding: 0 11px;
      }

      .field textarea {
        min-height: 112px;
        resize: vertical;
        padding: 10px 11px;
        line-height: 1.5;
      }

      .field input:focus,
      .field textarea:focus,
      select:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(31, 122, 85, 0.14);
      }

      .wide {
        margin-top: 12px;
      }

      .stat-panels {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      .stat-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
        padding: 12px;
      }

      .stat-panel h3 {
        margin-bottom: 10px;
      }

      .verification-row {
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        min-height: 50px;
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }

      .verification-row a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border-radius: 8px;
        background: #101828;
        padding: 0 13px;
        color: #ffffff;
        font-size: 13px;
        font-weight: 900;
        text-decoration: none;
      }

      .post-preview {
        position: relative;
        aspect-ratio: 4 / 5;
        width: 100%;
        overflow: hidden;
        border: 1px solid #c8d0c4;
        border-radius: 8px;
        background: #0d1b2f;
        color: #ffffff;
      }

      .post-preview.t20 {
        background: linear-gradient(130deg, #07182e 0%, #12213a 52%, #274630 100%);
      }

      .post-preview.forty {
        display: grid;
        grid-template-columns: 28% 1fr;
        background: #f8f7f4;
        color: #111827;
      }

      .t20-title {
        position: absolute;
        top: 4%;
        left: 7%;
        display: grid;
        gap: 2px;
      }

      .t20-title span {
        color: rgba(255, 255, 255, 0.5);
        font-size: 20px;
        font-weight: 900;
      }

      .t20-title strong {
        width: 225px;
        font-size: 40px;
        line-height: 0.92;
      }

      .mock-player {
        position: absolute;
        right: 5%;
        bottom: 12%;
        display: grid;
        place-items: center;
        width: 46%;
        aspect-ratio: 0.72;
        border-radius: 44% 44% 14% 14%;
        background: linear-gradient(180deg, #f3f5f7 0 18%, #d92f34 18% 40%, #151b25 40% 100%);
        box-shadow: -28px 22px 70px rgba(0, 0, 0, 0.35);
      }

      .mock-player span {
        display: grid;
        place-items: center;
        width: 74px;
        height: 74px;
        border-radius: 999px;
        background: #ffffff;
        color: #111827;
        font-size: 26px;
        font-weight: 900;
      }

      .mock-player.light {
        right: auto;
        bottom: auto;
        width: 38%;
        background: linear-gradient(180deg, #10223e 0 17%, #f8fafc 17% 100%);
        box-shadow: none;
      }

      .poster-name {
        position: absolute;
        top: 36%;
        left: 5%;
        width: 54%;
        transform: skewX(-10deg);
        background: #128ee8;
        padding: 12px;
        font-size: 22px;
        font-weight: 900;
        text-align: center;
      }

      .poster-stats {
        position: absolute;
        left: 6%;
        bottom: 20%;
        display: grid;
        grid-template-columns: 90px 80px 110px 80px;
        gap: 8px 12px;
        align-items: end;
        width: 60%;
      }

      .poster-stats span {
        color: var(--sky);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .poster-stats strong {
        border-bottom: 2px solid var(--sky);
        padding-bottom: 4px;
        font-size: 38px;
        line-height: 1;
      }

      .poster-result {
        position: absolute;
        left: 5%;
        bottom: 10%;
        width: 58%;
        transform: skewX(-9deg);
        background: #128ee8;
        padding: 9px 12px;
        font-size: 15px;
        font-weight: 900;
        text-align: center;
        text-transform: uppercase;
      }

      .side-rail {
        display: grid;
        place-items: center;
        height: 100%;
        background: #10223e;
        color: #ffffff;
        font-size: 31px;
        font-weight: 900;
        line-height: 1.1;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
      }

      .forty-header {
        position: absolute;
        top: 6%;
        right: 6%;
        display: grid;
        gap: 4px;
        text-align: right;
      }

      .forty-header strong {
        color: var(--coral);
        font-size: 34px;
        font-weight: 900;
      }

      .forty-header span {
        font-size: 15px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .field-photo {
        position: absolute;
        top: 18%;
        right: 6%;
        display: grid;
        place-items: center;
        width: 62%;
        height: 46%;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.18), transparent 40%),
          linear-gradient(180deg, #9dcc72 0%, #5b8e3e 100%);
      }

      .field-photo::after {
        position: absolute;
        inset: 0 40%;
        content: "";
        background: rgba(218, 196, 135, 0.9);
      }

      .forty-name {
        position: absolute;
        top: 68%;
        right: 7%;
        width: 52%;
        color: #0b0f19;
        font-size: 24px;
        font-weight: 900;
        text-align: center;
      }

      .forty-stat-boxes {
        position: absolute;
        top: 75%;
        right: 6%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 62%;
      }

      .forty-stat-boxes strong {
        min-height: 58px;
        background: #ffffff;
        padding: 10px 8px;
        font-size: 18px;
        line-height: 1.15;
        text-align: center;
        text-transform: uppercase;
      }

      .forty-result {
        position: absolute;
        right: 6%;
        bottom: 4%;
        width: 62%;
        border-top: 2px solid #1f2937;
        padding-top: 12px;
        color: #111827;
        font-size: 15px;
        font-weight: 900;
        text-align: center;
        text-transform: uppercase;
      }

      .caption-field textarea {
        min-height: 150px;
        background: #f8fafc;
      }

      .export-canvas {
        display: none;
      }

      @media (max-width: 1220px) {
        .workbench {
          grid-template-columns: 280px minmax(420px, 1fr);
        }

        .preview-panel {
          grid-column: 1 / -1;
        }

        .post-preview {
          max-width: 430px;
        }
      }

      @media (max-width: 820px) {
        .app-shell {
          padding: 12px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .topbar-actions {
          width: 100%;
        }

        .primary-button,
        .ghost-button {
          flex: 1 1 160px;
        }

        .metrics-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .workbench,
        .form-grid,
        .stat-panels {
          grid-template-columns: 1fr;
        }

        .preview-panel {
          grid-column: auto;
        }
      }

      @media (max-width: 520px) {
        h1 {
          font-size: 24px;
        }

        .metrics-strip,
        .mini-grid {
          grid-template-columns: 1fr;
        }

        .metric {
          min-height: 58px;
        }

        .verification-row {
          grid-template-columns: 1fr;
        }

        .t20-title strong {
          width: 178px;
          font-size: 31px;
        }

        .poster-stats {
          grid-template-columns: 70px 70px;
          width: 48%;
        }

        .poster-stats strong {
          font-size: 28px;
        }

        .forty-header strong {
          font-size: 25px;
        }

        .side-rail {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Washington Cricket League</p>
          <h1>Social Post Studio</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-button" id="load-sheet">Load Google Sheet</button>
          <button class="ghost-button" id="import-csv">Import CSV</button>
          <button class="ghost-button" id="copy-caption">Copy caption</button>
          <button class="primary-button" id="download-image">Download post image</button>
          <input type="file" id="csv-input" accept=".csv,text/csv" hidden />
        </div>
      </section>

      <section class="metrics-strip" aria-label="Workflow summary" id="metrics"></section>
      <div class="source-status" id="source-status">Loading real submissions from the shared Google Sheet...</div>

      <section class="workbench">
        <aside class="queue">
          <div class="section-heading">
            <h2>Submissions</h2>
            <span id="batch-count"></span>
          </div>
          <div id="queue-controls"></div>
          <div class="queue-list" id="queue-list"></div>

          <div class="connection-panel">
            <h2>Connection plan</h2>
            <label class="check-row"><input type="checkbox" checked disabled /> Google Form fields mapped</label>
            <label class="check-row"><input type="checkbox" checked disabled /> Player photo link saved</label>
            <label class="check-row"><input type="checkbox" disabled /> WCL scorecard link</label>
            <label class="check-row"><input type="checkbox" disabled /> Facebook page token</label>
          </div>
        </aside>

        <section class="editor" id="editor"></section>

        <aside class="preview-panel">
          <div class="section-heading">
            <h2>Facebook package</h2>
            <span id="template-label"></span>
          </div>
          <div class="post-preview" id="post-preview"></div>
          <label class="field wide caption-field">
            <span>Suggested Facebook caption</span>
            <textarea readonly id="caption"></textarea>
          </label>
          <canvas class="export-canvas" id="export-canvas" aria-hidden="true"></canvas>
        </aside>
      </section>
    </main>

    <script>
      const statusLabels = {
        new: "New",
        verify: "Needs WCL check",
        ready: "Ready to post",
        posted: "Posted",
      };

      const templateLabels = {
        t20: "T20 poster",
        forty: "40 overs card",
      };

      const REAL_SHEET_ID = "1W_HTrAllc7MPMJhmBFe-MWi30gCsYmNbZ0WkRsD5k_U";
      const REAL_SHEET_NAME = "Form Responses 1";

      let submissions = [
        {
          id: 101,
          status: "verify",
          template: "t20",
          gameDate: "2026-05-30",
          ground: "Metro Oval",
          homeTeam: "Metro CC",
          awayTeam: "Jamaica CC",
          division: "Division II",
          player: "Roscoe Sinclair",
          team: "Metro CC",
          opponent: "Jamaica CC",
          performanceDetails: "54 runs from 41 balls, 1 four, 2 sixes. 2 overs, 11 runs, 1 wicket.",
          batting: { runs: "54", balls: "41", fours: "1", sixes: "2", strikeRate: "131.71" },
          bowling: { wickets: "1", overs: "2", runs: "11" },
          homeScore: "150/7 (20 OV)",
          awayScore: "110/9 (20 OV)",
          result: "Metro CC won by 40 runs",
        },
        {
          id: 102,
          status: "ready",
          template: "forty",
          gameDate: "2026-06-06",
          ground: "Veterans",
          homeTeam: "Mustangs CC",
          awayTeam: "Loudoun United CC",
          division: "Division III",
          player: "Hamza Shakeel",
          team: "Loudoun United CC",
          opponent: "Mustangs CC",
          performanceDetails: "144* from 89 balls with 17 fours and 7 sixes. 6 overs, 46 runs, 2 wickets.",
          batting: { runs: "144*", balls: "89", fours: "17", sixes: "7", strikeRate: "161.80" },
          bowling: { wickets: "2", overs: "6", runs: "46" },
          homeScore: "251/9 (40 OV)",
          awayScore: "254/3 (30.5 OV)",
          result: "Loudoun United CC won by 7 wickets",
        },
        {
          id: 103,
          status: "new",
          template: "forty",
          gameDate: "2024-07-20",
          ground: "Galway Park",
          homeTeam: "Khulle Sher Sports Club",
          awayTeam: "DC Knight Riders",
          division: "Division 2",
          player: "Amandeep Singh",
          team: "Khulle Sher Sports Club",
          opponent: "DC Knight Riders",
          performanceDetails: "8-2-28-4 wickets and 21 from 22 balls with 3 fours.",
          batting: { runs: "21", balls: "22", fours: "3", sixes: "0", strikeRate: "95.45" },
          bowling: { wickets: "4", overs: "8", runs: "28" },
          homeScore: "",
          awayScore: "",
          result: "",
        },
      ];

      let selectedId = submissions[0].id;
      let lastSheetSignature = "";
      let lastSheetLoadTime = "";
      let hasLoadedLiveSheet = false;
      let isSheetRequestInFlight = false;
      let queueMode = "latest";
      let queueSearch = "";
      let visibleLimit = 30;

      function selected() {
        return submissions.find((submission) => submission.id === selectedId) || submissions[0];
      }

      function setSourceStatus(message) {
        document.getElementById("source-status").textContent = message;
      }

      function normalizeHeading(value) {
        return String(value ?? "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "");
      }

      function valueFromRecord(record, possibleNames) {
        const normalized = {};
        Object.keys(record).forEach((key) => {
          normalized[normalizeHeading(key)] = record[key];
        });
        for (const name of possibleNames) {
          const value = normalized[normalizeHeading(name)];
          if (value !== undefined && value !== null && String(value).trim() !== "") {
            return String(value).trim();
          }
        }
        return "";
      }

      function normalizeDateForApp(value) {
        const text = String(value ?? "").trim();
        const match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (match) {
          return `${match[3]}-${match[1].padStart(2, "0")}-${match[2].padStart(2, "0")}`;
        }
        return text;
      }

      function inferTemplateFromRecord(record) {
        const joined = Object.values(record).join(" ").toLowerCase();
        if (joined.includes("t20") || joined.includes("20 ov") || joined.includes("20 overs")) {
          return "t20";
        }
        return "forty";
      }

      function stableRowId(record, index) {
        const keyParts = [
          valueFromRecord(record, ["Timestamp"]),
          valueFromRecord(record, ["Game Date", "Date"]),
          valueFromRecord(record, ["Top Performer", "Player", "Player Name"]),
          valueFromRecord(record, ["Home Team", "Home"]),
          valueFromRecord(record, ["Away Team", "Away"]),
          index + 1,
        ];
        let hash = 0;
        const key = keyParts.join("|");
        for (let i = 0; i < key.length; i += 1) {
          hash = (hash * 31 + key.charCodeAt(i)) >>> 0;
        }
        return 100000 + hash;
      }

      function recordToSubmission(record, index) {
        const homeTeam = valueFromRecord(record, ["Home Team", "Home"]);
        const awayTeam = valueFromRecord(record, ["Away Team", "Away"]);
        const details = valueFromRecord(record, ["Performance Details", "Performance", "Stats"]);
        const submission = {
          id: stableRowId(record, index),
          status: "new",
          template: inferTemplateFromRecord(record),
          gameDate: normalizeDateForApp(valueFromRecord(record, ["Game Date", "Date"])),
          ground: valueFromRecord(record, ["Ground", "Venue"]),
          homeTeam,
          awayTeam,
          division: valueFromRecord(record, ["Division"]),
          player: valueFromRecord(record, ["Top Performer", "Player", "Player Name"]),
          team: homeTeam,
          opponent: awayTeam,
          playerPhotoUrl: valueFromRecord(record, ["Upload Player Picture", "Player Picture", "Photo", "Picture"]),
          performanceDetails: details,
          batting: { runs: "", balls: "", fours: "", sixes: "", strikeRate: "" },
          bowling: { wickets: "", overs: "", runs: "" },
          homeScore: valueFromRecord(record, ["Home Score"]),
          awayScore: valueFromRecord(record, ["Away Score"]),
          result: valueFromRecord(record, ["Result", "Match Result"]),
        };
        inferStats(details, submission);
        return submission;
      }

      function replaceSubmissions(records, sourceName, options = {}) {
        const mapped = records
          .map(recordToSubmission)
          .filter((submission) => submission.player || submission.gameDate || submission.performanceDetails);
        if (!mapped.length) {
          if (!options.silent) setSourceStatus(`No usable rows found in ${sourceName}. Check the headers and try CSV import.`);
          return;
        }
        const nextSignature = JSON.stringify(mapped);
        const now = new Date();
        lastSheetLoadTime = now.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" });
        if (options.live && nextSignature === lastSheetSignature) {
          setSourceStatus(`Live Google Sheet connected. ${mapped.length} row${mapped.length === 1 ? "" : "s"} loaded. Last checked ${lastSheetLoadTime}.`);
          return;
        }
        lastSheetSignature = nextSignature;
        const previousSelection = selectedId;
        submissions = mapped;
        selectedId = submissions.some((submission) => submission.id === previousSelection)
          ? previousSelection
          : submissions[0].id;
        hasLoadedLiveSheet = options.live || hasLoadedLiveSheet;
        const loadedText = options.live
          ? `Live Google Sheet connected. Showing ${mapped.length} player submission${mapped.length === 1 ? "" : "s"}. Last updated ${lastSheetLoadTime}.`
          : `Loaded ${mapped.length} real submission${mapped.length === 1 ? "" : "s"} from ${sourceName}.`;
        setSourceStatus(loadedText);
        render();
      }

      function parseGoogleTable(table) {
        const labels = table.cols.map((column, index) => column.label || column.id || `Column ${index + 1}`);
        return table.rows.map((row) => {
          const record = {};
          labels.forEach((label, index) => {
            const cell = row.c[index];
            record[label] = cell ? cell.f ?? cell.v ?? "" : "";
          });
          return record;
        });
      }

      function loadGoogleSheet(options = {}) {
        if (isSheetRequestInFlight) return;
        isSheetRequestInFlight = true;
        if (!options.silent) setSourceStatus("Loading the shared Google Sheet...");
        const callbackName = `wclSheetCallback_${Date.now()}`;
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          isSheetRequestInFlight = false;
          cleanup();
          const fallbackMessage = hasLoadedLiveSheet
            ? `Live Google Sheet connected. Last checked ${lastSheetLoadTime}; retrying automatically.`
            : "Google Sheet load timed out. Use Import CSV as the fallback.";
          setSourceStatus(fallbackMessage);
        }, 12000);

        function cleanup() {
          window.clearTimeout(timeout);
          script.remove();
          delete window[callbackName];
        }

        window[callbackName] = (response) => {
          isSheetRequestInFlight = false;
          cleanup();
          if (response?.status === "error") {
            setSourceStatus("Google returned an error. Make sure the sheet is shared with anyone who has the link.");
            return;
          }
          const records = parseGoogleTable(response.table);
          replaceSubmissions(records, "Google Sheet", { live: true, silent: options.silent });
        };

        script.onerror = () => {
          isSheetRequestInFlight = false;
          cleanup();
          const fallbackMessage = hasLoadedLiveSheet
            ? `Live Google Sheet connected. Last checked ${lastSheetLoadTime}; retrying automatically.`
            : "The browser could not load the Google Sheet. Export the sheet as CSV and use Import CSV.";
          setSourceStatus(fallbackMessage);
        };

        const tqx = encodeURIComponent(`out:json;responseHandler:${callbackName}`);
        script.src = `https://docs.google.com/spreadsheets/d/${REAL_SHEET_ID}/gviz/tq?tqx=${tqx}&sheet=${encodeURIComponent(REAL_SHEET_NAME)}`;
        document.body.appendChild(script);
      }

      function parseCsv(text) {
        const rows = [];
        let row = [];
        let value = "";
        let quoted = false;
        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const next = text[index + 1];
          if (char === '"' && quoted && next === '"') {
            value += '"';
            index += 1;
          } else if (char === '"') {
            quoted = !quoted;
          } else if (char === "," && !quoted) {
            row.push(value);
            value = "";
          } else if ((char === "\n" || char === "\r") && !quoted) {
            if (char === "\r" && next === "\n") index += 1;
            row.push(value);
            if (row.some((cell) => cell.trim() !== "")) rows.push(row);
            row = [];
            value = "";
          } else {
            value += char;
          }
        }
        row.push(value);
        if (row.some((cell) => cell.trim() !== "")) rows.push(row);
        return rows;
      }

      function importCsvFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          hasLoadedLiveSheet = false;
          const rows = parseCsv(String(reader.result ?? ""));
          const headers = rows.shift() || [];
          const records = rows.map((row) => {
            const record = {};
            headers.forEach((header, index) => {
              record[header] = row[index] ?? "";
            });
            return record;
          });
          replaceSubmissions(records, file.name);
        };
        reader.onerror = () => setSourceStatus("Could not read that CSV file.");
        reader.readAsText(file);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDate(value) {
        const date = new Date(`${value}T12:00:00`);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        }).format(date);
      }

      function dateValue(value) {
        const date = new Date(`${value}T12:00:00`);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function sameDay(first, second) {
        return (
          first.getFullYear() === second.getFullYear() &&
          first.getMonth() === second.getMonth() &&
          first.getDate() === second.getDate()
        );
      }

      function latestWeekendDates() {
        const dates = submissions
          .map((submission) => dateValue(submission.gameDate))
          .filter(Boolean)
          .sort((a, b) => b.getTime() - a.getTime());
        const latest = dates[0];
        if (!latest) return [];
        const start = new Date(latest);
        if (latest.getDay() === 0) start.setDate(latest.getDate() - 1);
        const end = new Date(start);
        end.setDate(start.getDate() + 1);
        return [start, end];
      }

      function isLatestWeekendSubmission(submission) {
        const dates = latestWeekendDates();
        if (!dates.length) return true;
        const date = dateValue(submission.gameDate);
        if (!date) return false;
        return dates.some((weekendDate) => sameDay(date, weekendDate));
      }

      function getVisibleSubmissions() {
        const search = queueSearch.trim().toLowerCase();
        let visible = [...submissions];
        if (queueMode === "latest") {
          visible = visible.filter(isLatestWeekendSubmission);
        } else if (queueMode !== "all") {
          visible = visible.filter((submission) => submission.status === queueMode);
        }
        if (search) {
          visible = visible.filter((submission) => {
            const haystack = [
              submission.player,
              submission.homeTeam,
              submission.awayTeam,
              submission.team,
              submission.opponent,
              submission.division,
              submission.ground,
            ]
              .join(" ")
              .toLowerCase();
            return haystack.includes(search);
          });
        }
        visible.sort((a, b) => {
          const aDate = dateValue(a.gameDate)?.getTime() ?? 0;
          const bDate = dateValue(b.gameDate)?.getTime() ?? 0;
          return bDate - aDate || a.player.localeCompare(b.player);
        });
        return visible;
      }

      function toTitleCase(value) {
        return String(value)
          .toLowerCase()
          .split(" ")
          .filter(Boolean)
          .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
          .join(" ");
      }

      function initials(value) {
        return String(value)
          .split(" ")
          .filter(Boolean)
          .slice(0, 2)
          .map((word) => word.charAt(0).toUpperCase())
          .join("");
      }

      function buildCaption(submission) {
        const lines = [
          `Player of the Match: ${toTitleCase(submission.player)}`,
          `${submission.team} vs ${submission.opponent}`,
          `${formatDate(submission.gameDate)} at ${submission.ground}`,
          "",
          submission.batting.runs
            ? `Batting: ${submission.batting.runs} (${submission.batting.balls}), ${submission.batting.fours}x4, ${submission.batting.sixes}x6, SR ${submission.batting.strikeRate}`
            : "",
          submission.bowling.wickets
            ? `Bowling: ${submission.bowling.wickets} wickets, ${submission.bowling.overs} overs, ${submission.bowling.runs} runs`
            : "",
          submission.result ? `Result: ${submission.result}` : "",
          "",
          "#WashingtonCricketLeague #WCL #Cricket",
        ];
        return lines.filter((line, index) => line || index === 3 || index === 7).join("\n");
      }

      function inferStats(details, submission) {
        const runsMatch = details.match(/(\d+)\s*\*?\s*(?:runs|run)/i) || details.match(/(\d+)\s*\*?\s*(?:\(|from|off)/i);
        const ballsMatch = details.match(/(?:from|off)\s*(\d+)\s*(?:balls?|ball|b)?/i) || details.match(/\((\d+)\)/);
        const foursMatch = details.match(/(\d+)\s*(?:x|[*-])?\s*4s?/i) || details.match(/(\d+)\s*fours?/i);
        const sixesMatch = details.match(/(\d+)\s*(?:x|[*-])?\s*6s?/i) || details.match(/(\d+)\s*sixes?/i);
        const wicketsMatch = details.match(/(\d+)\s*wickets?/i) || details.match(/w\s*=?\s*(\d+)/i) || details.match(/\d+(?:\.\d+)?-\d+-(\d+)-\d+/);
        const bowlingFigure = details.match(/(\d+(?:\.\d+)?)-(\d+)-(\d+)-(\d+)/);
        const oversMatch = details.match(/(\d+(?:\.\d+)?)\s*(?:overs?|ov)/i) || bowlingFigure;
        const runsGivenMatch =
          details.match(/(?:gave away|given|for)\s*(\d+)\s*(?:runs?|run)/i) ||
          details.match(/(?:overs?|ov)\D+(\d+)\s*(?:runs?|run)/i) ||
          bowlingFigure;
        const runs = runsMatch?.[1] ?? submission.batting.runs;
        const balls = ballsMatch?.[1] ?? submission.batting.balls;
        const numericRuns = Number(String(runs).replace(/\D/g, ""));
        const strikeRate = runs && balls && Number(balls) > 0 ? ((numericRuns / Number(balls)) * 100).toFixed(2) : submission.batting.strikeRate;
        submission.performanceDetails = details;
        submission.batting.runs = runs;
        submission.batting.balls = balls;
        submission.batting.fours = foursMatch?.[1] ?? submission.batting.fours;
        submission.batting.sixes = sixesMatch?.[1] ?? submission.batting.sixes;
        submission.batting.strikeRate = strikeRate;
        submission.bowling.wickets = wicketsMatch?.[1] ?? bowlingFigure?.[4] ?? submission.bowling.wickets;
        submission.bowling.overs = oversMatch?.[1] ?? submission.bowling.overs;
        submission.bowling.runs = runsGivenMatch?.[1] ?? bowlingFigure?.[3] ?? submission.bowling.runs;
      }

      function setPath(path, value) {
        const target = selected();
        const parts = path.split(".");
        if (parts.length === 1) {
          target[path] = value;
        } else {
          target[parts[0]][parts[1]] = value;
        }
        if (path === "homeTeam") target.opponent = target.awayTeam;
        if (path === "awayTeam") target.opponent = value;
        render();
      }

      function input(label, path, value) {
        return `
          <label class="field">
            <span>${escapeHtml(label)}</span>
            <input value="${escapeHtml(value)}" data-path="${escapeHtml(path)}" />
          </label>
        `;
      }

      function renderMetrics() {
        document.getElementById("metrics").innerHTML = Object.keys(statusLabels)
          .map((status) => {
            const count = submissions.filter((submission) => submission.status === status).length;
            return `<div class="metric"><span>${statusLabels[status]}</span><strong>${count}</strong></div>`;
          })
          .join("");
      }

      function renderQueue() {
        const visible = getVisibleSubmissions();
        const limited = visible.slice(0, visibleLimit);
        const searchWasFocused = document.activeElement?.id === "queue-search";
        const searchCursor = document.getElementById("queue-search")?.selectionStart ?? queueSearch.length;
        document.getElementById("batch-count").textContent = `${limited.length} shown`;
        document.getElementById("queue-controls").innerHTML = `

                <option value="verify" ${queueMode === "verify" ? "selected" : ""}>Needs WCL check</option>
                <option value="ready" ${queueMode === "ready" ? "selected" : ""}>Ready to post</option>

              </select>
              <input id="queue-search" placeholder="Search player, team, division" value="${escapeHtml(queueSearch)}" />
            </div>

        const summary = document.getElementById("queue-summary");

        }[queueMode];
        summary.textContent = `Showing ${limited.length} of ${visible.length} ${modeText} from ${submissions.length} total rows.`;
        document.getElementById("queue-list").innerHTML = limited
          .map(
            (submission) => `
              <button class="queue-item ${submission.id === selectedId ? "active" : ""}" data-select="${submission.id}">
                <span class="status-dot ${escapeHtml(submission.status)}"></span>

          (visible.length > limited.length

            : "");
        document.getElementById("queue-mode").addEventListener("change", (event) => {
          queueMode = event.target.value;

            selectedId = nextVisible[0].id;
          }
          render();
        });
        document.getElementById("queue-search").addEventListener("input", (event) => {
          queueSearch = event.target.value;
          visibleLimit = 30;
          const nextVisible = getVisibleSubmissions();
          let selectionChanged = false;
          if (nextVisible.length && !nextVisible.some((submission) => submission.id === selectedId)) {
            selectedId = nextVisible[0].id;
            selectionChanged = true;
          }
          if (selectionChanged) {
            render();
          } else {
            renderQueue();
          }
        });
        if (searchWasFocused) {
          const searchInput = document.getElementById("queue-search");
          searchInput.focus();
          searchInput.setSelectionRange(searchCursor, searchCursor);
        }
        document.getElementById("show-more")?.addEventListener("click", () => {
          visibleLimit += 30;
          renderQueue();
        });
        document.querySelectorAll("[data-select]").forEach((button) => {
          button.addEventListener("click", () => {
            selectedId = Number(button.dataset.select);
            render();

      function drawRoundLogo(context, x, y, radius, label, color) {
        context.save();
        context.beginPath();
        context.arc(x, y, radius, 0, Math.PI * 2);
        context.fillStyle = "#f8fafc";
        context.fill();
        context.lineWidth = 7;
        context.strokeStyle = color;
        context.stroke();
        context.fillStyle = "#0f172a";
        context.font = `800 ${radius * 0.72}px Arial`;
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.fillText(initials(label), x, y + 1);
        context.restore();
      }

      function drawT20(context, submission) {
        const width = 1080;
        const height = 1350;
        const gradient = context.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, "#07182e");
        gradient.addColorStop(0.48, "#12213a");
        gradient.addColorStop(1, "#243d2f");
        context.fillStyle = gradient;
        context.fillRect(0, 0, width, height);
        context.fillStyle = "rgba(255,255,255,0.06)";
        for (let i = 0; i < 5; i += 1) {
          context.beginPath();
          context.arc(710 + i * 28, 260 + i * 34, 180 + i * 18, 0, Math.PI * 2);
          context.fill();
        }
        context.fillStyle = "#f8fafc";
        context.font = "900 126px Arial";
        context.textAlign = "left";
        context.fillText("PLAYER", 64, 336);
        context.fillText("MATCH", 150, 452);
        context.fillStyle = "#4fc3ff";
        context.font = "900 50px Arial";

      function exportImage() {
        const canvas = document.getElementById("export-canvas");
        const context = canvas.getContext("2d");
        const submission = selected();
        canvas.width = 1080;
        canvas.height = 1350;
        if (submission.template === "t20") {
          drawT20(context, submission);
        } else {
          drawForty(context, submission);
        }
        const link = document.createElement("a");
        link.download = `${submission.player.replace(/\s+/g, "-").toLowerCase()}-${submission.template}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      async function copyCaption() {
        const caption = document.getElementById("caption").value;
        try {
          await navigator.clipboard.writeText(caption);
        } catch {
          const helper = document.createElement("textarea");
          helper.value = caption;
          document.body.appendChild(helper);
          helper.select();
          document.execCommand("copy");
          helper.remove();
        }
      }

      function render() {
        renderMetrics();
        renderQueue();
        renderEditor();
        renderPreview();
      }

      document.getElementById("copy-caption").addEventListener("click", copyCaption);
      document.getElementById("download-image").addEventListener("click", exportImage);
      document.getElementById("load-sheet").addEventListener("click", loadGoogleSheet);
      document.getElementById("import-csv").addEventListener("click", () => {
        document.getElementById("csv-input").click();
      });
      document.getElementById("csv-input").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (file) importCsvFile(file);
        event.target.value = "";
      });
      render();
      loadGoogleSheet();
      window.setInterval(() => loadGoogleSheet({ silent: true }), 60000);
    </script>
